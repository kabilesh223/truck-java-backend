server.port=${PORT:8000}

# H2 Database (file-based like SQLite)
spring.datasource.url=jdbc:h2:file:/app/data/truckdb;AUTO_SERVER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# JWT
app.jwt.secret=truck_management_super_secret_key_2024_spring_boot_secure
app.jwt.expiration=86400000

# CORS - allow all origins for deployment
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://truck-management-kabilesh223.vercel.app,*

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
